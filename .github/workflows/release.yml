name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    name: Build with GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: true
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Set up build environment
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i '/^Types: deb/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get -qqq update
          sudo apt-get -qqqy install libpam0g-dev:amd64 libpam0g-dev:arm64 gcc-aarch64-linux-gnu
      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-artifact
          path: |
            dist/checksums.txt
            dist/**/*.deb
            dist/**/*.tar.gz
            dist/**/*.sbom.json
          retention-days: 1

  repo:
    name: Publish to APT repository
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-artifact
          path: dist
      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Setup deb-s3
        run: |
          sudo wget -O /etc/apt/trusted.gpg.d/deb-s3-keyring.asc https://deb-s3.github.io/deb-s3/gpg.key
          echo "deb https://deb-s3.github.io/deb-s3 deb-s3 main" | sudo tee /etc/apt/sources.list.d/deb-s3.list
          sudo apt-get update
          sudo apt-get install deb-s3
      - name: Upload .deb packages to repo
        run: |
          find dist -name '*.deb' | xargs -I{} deb-s3 upload \
            --bucket packages \
            --s3-region auto \
            --endpoint https://${{ vars.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --access-key-id ${{ secrets.R2_ACCESS_KEY_ID }} \
            --secret-access-key ${{ secrets.R2_SECRET_ACCESS_KEY }} \
            --sign ${{ vars.GPG_KEY_ID }} \
            --codename stable \
            --component main \
            --prefix pam-ussh \
            --visibility nil \
            {}
        env:
          # R2 does not support CRC32 checksums introduced in AWS SDK
          # https://github.com/aws/aws-sdk-ruby/issues/3166
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      - name: Upload public key to apt repo
        run: |
          gpg --armor --export ${{ vars.GPG_KEY_ID }} > pubkey.gpg
          aws s3 cp pubkey.gpg s3://packages/pam-ussh/pubkey.gpg \
            --endpoint-url https://${{ vars.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
